<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
  <!-- Container navbar -->
  <div class="container-fluid">
    <span class="navbar-brand">Catalog</span>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation List -->
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <!-- Movies Section  -->
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/movies"
            (click)="resetFilters()"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-current="page"
            href="#"
            >Movies</a
          >
        </li>
        <!-- Add new Section -->
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/add"
            aria-current="page"
            href="#"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            >Add new</a
          >
        </li>
      </ul>

      <div
        class="d-flex flex-column flex-lg-row align-items-start align-items-lg-center gap-3 ms-auto"
      >
        <!-- FILTER BUTTONS -->
        <div class="d-flex gap-2">
          <button
            class="btn btn-sm rounded-pill px-3"
            [ngClass]="isActive('seen') ? 'btn-success' : 'btn-outline-success'"
            (click)="setFilter('seen')"
          >
            ✓ Seen
          </button>

          <button
            class="btn btn-sm rounded-pill px-3"
            [ngClass]="isActive('unseen') ? 'btn-danger' : 'btn-outline-danger'"
            (click)="setFilter('unseen')"
          >
            ✕ Unseen
          </button>
        </div>

        <!-- SEARCH -->
        <form class="d-flex">
          <input
            class="form-control form-control-sm"
            type="search"
            placeholder="Search"
            [ngModel]="searchString()"
            (ngModelChange)="searchString.set($event)"
            name="search"
          />
        </form>
      </div>
    </div>
  </div>
</nav>
<router-outlet></router-outlet>
